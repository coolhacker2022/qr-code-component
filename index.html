<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    :root {
      --color-white: hsl(0, 0%, 100%);
      --color-slate-300: hsl(212, 45%, 89%);
      --color-slate-500: hsl(216, 15%, 48%);
      --color-slate-900: hsl(218, 44%, 22%);
      
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      background-color: var(--color-slate-300);
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .card {
      display: flex;
      flex-direction: column;
      background-color: var(--color-white);
      max-width: 320px;
      gap: 24px;
      padding: 16px 16px 40px 16px;
      border-radius: 20px;
      align-items: center;
      justify-content: flex-start;
      box-shadow: 0px 5px 24px 0px rgba(0, 0, 0, 0.15);
    }

    .card__image {
      width: 100%;
      border-radius: 10px;
    }

    .card__body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-left: 16px;
      padding-right: 16px;
    }

    .card__header {
      color: var(--color-slate-900);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin: 0;
      line-height: 120%;
      letter-spacing: 0px;
    }

    .card__description {
      color: var(--color-slate-500);
      font-size: 15px;
      text-align: center;
      margin: 0;
      line-height: 140%;
      letter-spacing: 0px;
    }

  </style>
</head>
<body>
  <main>
    <figure class="card">
      <img class="card__image" src="./images/image-qr-code.png" alt="QR code linking to Frontend Mentor">
      <figcaption class="card__body">
        <h1 class="card__header">Improve your front-end skills by building projects</h1>
        <p class="card__description">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
      </figcaption>
    </figure>
  </main>

</body>
</html>
